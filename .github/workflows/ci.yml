name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Typecheck (tsc --noEmit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  test-node:
    name: node:test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Suíte node:test. Usa --test-force-exit (via script) para não pendurar em
      # handles de fundo (keep-alive de fetch). Em estabilização: parte dos testes
      # de integração ainda está sendo re-alinhada (Onda 4).
      - run: npm run test:node
