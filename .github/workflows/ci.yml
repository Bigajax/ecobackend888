name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Typecheck (tsc --noEmit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  test:
    name: test suite (node:test + jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # `npm test` roda as três suítes verdes: node:test (server/tests/**, via
      # --test-force-exit), jest raiz (tests/{quality,bandits,orchestrator}) e os
      # contract tests de API (server/tests/contract/*.spec.ts, forceExit no config).
      - run: npm test
