name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Typecheck (tsc --noEmit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  test:
    name: test suite (node:test + jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # `npm test` roda as duas suítes verdes: node:test (server/tests/**, via
      # --test-force-exit para não pendurar em handles de fundo) + jest raiz
      # (tests/{quality,bandits,orchestrator}). Os contract tests de API
      # (tests/contract/*.spec.ts via `npm run test:contract`) ainda não entram
      # aqui — estão sendo religados/consertados separadamente.
      - run: npm test
